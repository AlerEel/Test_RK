services:
  # PostgreSQL база данных
  postgres:
    image: postgres:15
    container_name: test_rk_postgres
    environment:
      POSTGRES_DB: Test_RK
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  # Flask приложение с планировщиком
  app:
    build: .
    container_name: test_rk_app_scheduler
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/Test_RK
      - ENABLE_SCHEDULER=true
    depends_on:
      - postgres
    networks:
      - app-network
    volumes:
      - ./inspections.json:/app/inspections.json
      - ./data:/app/data
    restart: unless-stopped
    command: ["/app/start_with_scheduler.sh"]

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge 